<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blue rounded square background — matches Navbar logo (#3b82f6, rounded-lg ≈ r=7) -->
  <rect width="32" height="32" rx="7" ry="7" fill="#3b82f6"/>

  <!-- ShoppingBag icon (Lucide, white, strokeWidth 2.5, scaled to fit 18×18 centered) -->
  <g transform="translate(7 7)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bag body path: M6 2 L3 6 V20 a2 2 0 0 0 2 2 H19 a2 2 0 0 0 2-2 V6 L18 2 Z (scaled 18/24) -->
    <path d="M4.5 1.5 L2.25 4.5 V15 a1.5 1.5 0 0 0 1.5 1.5 H14.25 a1.5 1.5 0 0 0 1.5-1.5 V4.5 L13.5 1.5 Z"/>
    <!-- Horizontal divider line -->
    <line x1="2.25" y1="4.5" x2="15.75" y2="4.5"/>
    <!-- Handle arc: path d="M16 10 a4 4 0 0 1-8 0" (scaled) -->
    <path d="M12 7.5 a3 3 0 0 1-6 0"/>
  </g>
</svg>
